name: Go CI (reusable)

# Shared Go CI: test + vet + fmt + lint + govulncheck, factored out of the
# near-identical per-repo copies. Every job fans out over a module matrix
# (default a single root module) with GOWORK=off, so a repo's local go.work is
# ignored and each module builds against its own go.mod -- matching how the
# multi-module repos (e.g. infodancer/ui) already run.
#
# The test job is the one with real per-repo variance (service containers,
# coverage upload, env). Service containers can't be passed into a reusable
# workflow, so DB-backed repos set run_tests=false and keep their own test
# workflow, calling this only for the static-analysis quartet.

on:
  workflow_call:
    inputs:
      modules:
        description: Go module directories to check, as a JSON array string.
        required: false
        type: string
        default: '["."]'
      go_version:
        description: >-
          Go version for test/vet/fmt/lint. Defaults to "stable" so CI tracks
          the current release instead of whatever patch a module's go.mod
          happens to name. Set "" to fall back to each module's go.mod (via
          go-version-file) -- do that for a module that deliberately supports
          an older Go, so CI actually exercises the version it claims. Or set
          an exact version to pin.
        required: false
        type: string
        default: "stable"
      govulncheck_go_version:
        description: >-
          Go version for govulncheck. Defaults to "stable": stdlib advisories
          are fixed by the newest patch, so scanning current release means they
          resolve themselves rather than needing a go.mod bump in every repo.
          Dependency advisories are unaffected and still gate normally.
          IMPORTANT -- scan with the toolchain you SHIP. Scanning newer than
          the shipped artifact hides stdlib vulnerabilities that are real in
          production, so a module whose Dockerfile pins an older `FROM golang:`
          must set this to match. Set "" to use go.mod.
        required: false
        type: string
        default: "stable"
      golangci_version:
        description: golangci-lint version.
        required: false
        type: string
        default: v2.10.1
      run_tests:
        description: >-
          Run the stateless `go test -race -count=1 ./...` job. Set false for
          repos whose tests need a service container; they keep their own test
          workflow.
        required: false
        type: boolean
        default: true
      run_govulncheck:
        description: >-
          Run the `govulncheck ./...` (source mode) job. Set false for repos
          that must scan in binary mode -- e.g. those whose tests pull
          testcontainers/moby transitively, where source mode surfaces
          server-side CVEs unreachable from the shipped binary; they keep their
          own govulncheck workflow. Prefer govulncheck_allow (below) when you
          still want those findings reported, just not gating.
        required: false
        type: boolean
        default: true
      govulncheck_allow:
        description: >-
          OSV IDs (JSON array string, e.g. '["GO-2026-5746"]') to report but not
          gate on. Allow-listed findings still print and are annotated as
          warnings for visibility; they just don't fail the job. Use for vulns
          with no available fix, or reachable only through test-support code
          (e.g. testcontainers/moby). Everything else still gates, so a fixable
          production vuln is never silently ignored.
        required: false
        type: string
        default: '[]'
      runner:
        description: >-
          runs-on labels, as a JSON array string. Defaults to the self-hosted CI
          pool so callers do not consume GitHub-hosted minutes; override with
          '["ubuntu-latest"]' for GitHub-hosted, or e.g. '["self-hosted","ci"]'
          for a pool without the "linux" label.
        required: false
        type: string
        default: '["self-hosted", "linux", "ci"]'

permissions:
  contents: read

jobs:
  test:
    if: ${{ inputs.run_tests }}
    runs-on: ${{ fromJSON(inputs.runner) }}
    env:
      GOWORK: "off"
      # Disable the shared Ryuk reaper. testcontainers-go names one reaper per
      # `go test` session (reaper_<sessionID>, hashed from the go-test parent
      # pid), shared across every package binary in the run, and starts it
      # check-then-create. A module whose `go test ./...` boots containers in
      # two packages at once races: both see no reaper, both create the
      # same-named container, and the loser dies on a Docker 409 conflict.
      # DB-backed tests terminate their own containers on the normal path, so
      # Ryuk only mattered for a killed/timed-out run leaking a container on the
      # persistent runner -- the always() reap step below covers that
      # deterministically, by label, with no create-race. Each matrix module is
      # its own job on its own LXC runner (isolated dockerd, one job per
      # runner), so the label filter only sees this job's containers. Same fix
      # as infodancer/web#90 / old-school-gamers/osg#420. Harmless for repos
      # whose tests use no containers.
      TESTCONTAINERS_RYUK_DISABLED: "true"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
          # go-version wins when both are set, so go-version-file only applies
          # when a caller clears go_version to follow its own go.mod. Keep
          # check-latest for that path: it installs the newest patch rather than
          # whatever go1.MINOR.x a runner has cached, and under GOTOOLCHAIN=local
          # a stale cache makes the build refuse to run, so a security patch bump
          # would otherwise fail on some runners and not others.
          check-latest: true
          # Persistent self-hosted runner: Go's own module and build caches
          # already persist on disk between jobs, so setup-go's tar-based cache
          # is redundant -- its restore collides with the populated dirs ("tar:
          # ... Cannot open: File exists") and its save re-uploads ~1.8 GB every
          # job (~2.5 min). Same cold-cache stance as the lint job's skip-cache;
          # Go's on-disk caches are concurrency-safe, so only the redundant
          # actions layer is disabled.
          cache: false
      - name: Test (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 ./...

      # Reap any testcontainers a killed, panicked, or timed-out run left
      # behind. With Ryuk disabled nothing else cleans these up on the
      # persistent runner, so do it deterministically by testcontainers' own
      # label. Runs even when the test step fails; -r keeps it a no-op when the
      # normal path already terminated everything (the common case).
      - name: Reap leftover testcontainers
        if: always()
        run: docker ps -aq --filter label=org.testcontainers=true | xargs -r docker rm -f

  vet:
    runs-on: ${{ fromJSON(inputs.runner) }}
    env:
      GOWORK: "off"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
          # go-version wins when both are set, so go-version-file only applies
          # when a caller clears go_version to follow its own go.mod. Keep
          # check-latest for that path: it installs the newest patch rather than
          # whatever go1.MINOR.x a runner has cached, and under GOTOOLCHAIN=local
          # a stale cache makes the build refuse to run, so a security patch bump
          # would otherwise fail on some runners and not others.
          check-latest: true
          # Persistent self-hosted runner: Go's own module and build caches
          # already persist on disk between jobs, so setup-go's tar-based cache
          # is redundant -- its restore collides with the populated dirs ("tar:
          # ... Cannot open: File exists") and its save re-uploads ~1.8 GB every
          # job (~2.5 min). Same cold-cache stance as the lint job's skip-cache;
          # Go's on-disk caches are concurrency-safe, so only the redundant
          # actions layer is disabled.
          cache: false
      - name: Vet (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: go vet ./...

  fmt:
    runs-on: ${{ fromJSON(inputs.runner) }}
    env:
      GOWORK: "off"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
          # go-version wins when both are set, so go-version-file only applies
          # when a caller clears go_version to follow its own go.mod. Keep
          # check-latest for that path: it installs the newest patch rather than
          # whatever go1.MINOR.x a runner has cached, and under GOTOOLCHAIN=local
          # a stale cache makes the build refuse to run, so a security patch bump
          # would otherwise fail on some runners and not others.
          check-latest: true
          # Persistent self-hosted runner: Go's own module and build caches
          # already persist on disk between jobs, so setup-go's tar-based cache
          # is redundant -- its restore collides with the populated dirs ("tar:
          # ... Cannot open: File exists") and its save re-uploads ~1.8 GB every
          # job (~2.5 min). Same cold-cache stance as the lint job's skip-cache;
          # Go's on-disk caches are concurrency-safe, so only the redundant
          # actions layer is disabled.
          cache: false
      - name: Check formatting (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: |
          # gofmt is a plain filesystem walk with no concept of Go module
          # boundaries or vendoring -- unlike go vet/build/golangci-lint,
          # which all skip vendor/ automatically. A vendored repo would
          # otherwise fail here on third-party code's own formatting, not
          # anything this repo authored.
          unformatted=$(find . -name '*.go' -not -path '*/vendor/*' -print0 | xargs -0 gofmt -l)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

  lint:
    runs-on: ${{ fromJSON(inputs.runner) }}
    env:
      GOWORK: "off"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
          # go-version wins when both are set, so go-version-file only applies
          # when a caller clears go_version to follow its own go.mod. Keep
          # check-latest for that path: it installs the newest patch rather than
          # whatever go1.MINOR.x a runner has cached, and under GOTOOLCHAIN=local
          # a stale cache makes the build refuse to run, so a security patch bump
          # would otherwise fail on some runners and not others.
          check-latest: true
          # Persistent self-hosted runner: Go's own module and build caches
          # already persist on disk between jobs, so setup-go's tar-based cache
          # is redundant -- its restore collides with the populated dirs ("tar:
          # ... Cannot open: File exists") and its save re-uploads ~1.8 GB every
          # job (~2.5 min). Same cold-cache stance as the lint job's skip-cache;
          # Go's on-disk caches are concurrency-safe, so only the redundant
          # actions layer is disabled.
          cache: false
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        env:
          # Per-job analysis cache (step-level env: the runner context is not
          # available in job env). golangci-lint's default cache dir lives
          # under the runner user's home, shared by every concurrent lint job
          # on a self-hosted host. Under concurrent access staticcheck can
          # load damaged per-package facts -- observed 2026-07-19 in memstore
          # as nondeterministic SA5011 false positives ("(*testing.common)
          # .Fatal does not return" fact lost) that came and went across runs
          # on identical code and identical pinned tool versions. runner.temp
          # is unique per job and wiped after it, so each run pays a cold
          # cache (~30-60s) and shares nothing.
          GOLANGCI_LINT_CACHE: ${{ runner.temp }}/golangci-lint-cache
        with:
          version: ${{ inputs.golangci_version }}
          working-directory: ${{ matrix.module }}
          # The action's default `verify: true` fetches the config JSONSchema
          # from golangci-lint.run on every run, so a slow response from that
          # host fails the lint job -- a red X that reads like a lint finding
          # on a PR that changed no Go code. Validating a checked-in config
          # file is a developer-time concern; run `golangci-lint config verify`
          # locally when editing .golangci.yml. A genuinely broken config still
          # fails the lint run itself.
          verify: false
          # Don't restore/save the analysis cache through the actions cache
          # service either -- a restored archive would land in the per-job
          # GOLANGCI_LINT_CACHE dir above and defeat its isolation, and
          # concurrent jobs racing on the same cache key is the suspected
          # corruption vector in the first place. Every lint run is cold on
          # purpose.
          skip-cache: true

  govulncheck:
    if: ${{ inputs.run_govulncheck }}
    runs-on: ${{ fromJSON(inputs.runner) }}
    env:
      GOWORK: "off"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.govulncheck_go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
          # See the build jobs above. Matters most here: scanning against a
          # stale cached toolchain would report stdlib vulnerabilities already
          # fixed in the patch we actually ship.
          check-latest: true
          # Persistent self-hosted runner: Go's own module and build caches
          # already persist on disk between jobs, so setup-go's tar-based cache
          # is redundant -- its restore collides with the populated dirs ("tar:
          # ... Cannot open: File exists") and its save re-uploads ~1.8 GB every
          # job (~2.5 min). Same cold-cache stance as the lint job's skip-cache;
          # Go's on-disk caches are concurrency-safe, so only the redundant
          # actions layer is disabled.
          cache: false
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        env:
          GOVULN_ALLOW: ${{ inputs.govulncheck_allow }}
        run: |
          set -uo pipefail
          # Human-readable pass for the job log (visibility); never gates on its
          # own -- the JSON pass below decides pass/fail.
          govulncheck ./... || true
          # Machine-readable pass drives the gate.
          govulncheck -format json ./... > govulncheck.json || true
          # OSV IDs whose vulnerable symbols are actually called (govulncheck's
          # own exit-3 criterion): a finding with a function at trace[0].
          called=$(jq -r 'select(has("finding")) | .finding
            | select(.trace[0].function != null) | .osv' govulncheck.json \
            | sort -u)
          allow=$(printf '%s' "${GOVULN_ALLOW:-[]}" | jq -r '.[]')
          status=0
          for id in $called; do
            if printf '%s\n' "$allow" | grep -qxF "$id"; then
              echo "::warning::${id} is reachable but allow-listed (reported, not gated)"
            else
              echo "::error::${id} is reachable and not allow-listed"
              status=1
            fi
          done
          exit $status
