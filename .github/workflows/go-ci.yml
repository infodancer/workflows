name: Go CI (reusable)

# Shared Go CI: test + vet + fmt + lint + govulncheck, factored out of the
# near-identical per-repo copies. Every job fans out over a module matrix
# (default a single root module) with GOWORK=off, so a repo's local go.work is
# ignored and each module builds against its own go.mod -- matching how the
# multi-module repos (e.g. infodancer/ui) already run.
#
# The test job is the one with real per-repo variance (service containers,
# coverage upload, env). Service containers can't be passed into a reusable
# workflow, so DB-backed repos set run_tests=false and keep their own test
# workflow, calling this only for the static-analysis quartet.

on:
  workflow_call:
    inputs:
      modules:
        description: Go module directories to check, as a JSON array string.
        required: false
        type: string
        default: '["."]'
      go_version:
        description: >-
          Go version for test/vet/fmt/lint. Empty uses each module's go.mod
          (via go-version-file); set it to pin an exact version.
        required: false
        type: string
        default: ""
      govulncheck_go_version:
        description: >-
          Go version for govulncheck specifically. Empty uses go.mod. Set this
          when a stdlib fix needs a newer toolchain than the actions/go-versions
          manifest yet offers (e.g. infodancer/ui pins 1.26.4 for GO-2026-5037).
        required: false
        type: string
        default: ""
      golangci_version:
        description: golangci-lint version.
        required: false
        type: string
        default: v2.10.1
      run_tests:
        description: >-
          Run the stateless `go test -race -count=1 ./...` job. Set false for
          repos whose tests need a service container; they keep their own test
          workflow.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  test:
    if: ${{ inputs.run_tests }}
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
      - name: Test (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 ./...

  vet:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
      - name: Vet (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: go vet ./...

  fmt:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
      - name: Check formatting (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ inputs.golangci_version }}
          working-directory: ${{ matrix.module }}

  govulncheck:
    runs-on: ubuntu-latest
    env:
      GOWORK: "off"
    strategy:
      matrix:
        module: ${{ fromJSON(inputs.modules) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ inputs.govulncheck_go_version }}
          go-version-file: ${{ matrix.module }}/go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck (${{ matrix.module }})
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...
